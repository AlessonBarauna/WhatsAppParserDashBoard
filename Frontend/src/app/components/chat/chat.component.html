<div class="chat-layout">

  <!-- Header -->
  <div class="chat-header glass-card" style="border-radius: var(--radius); margin-bottom: 0.75rem; padding: 0.85rem 1.25rem; display: flex; justify-content: space-between; align-items: center;">
    <div>
      <span style="font-weight: 700; color: var(--text-primary);">Assistente de Negócios</span>
      <span class="badge-neon badge-green" style="margin-left: 0.75rem; font-size: 0.7rem;">IA</span>
    </div>
    <button class="btn-fx btn-fx-ghost" style="font-size: 0.75rem; padding: 0.3rem 0.85rem;" (click)="clear()">
      Limpar conversa
    </button>
  </div>

  <!-- Messages -->
  <div class="chat-messages glass-card" style="flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem;">

    @for (msg of messages(); track $index) {
      <div class="chat-bubble {{ msg.role }}" [class.pending]="msg.pending">

        <div class="bubble-label">
          @if (msg.role === 'assistant') {
            <span class="badge-neon badge-cyan" style="font-size: 0.65rem;">IA</span>
          } @else {
            <span class="badge-neon badge-purple" style="font-size: 0.65rem;">Você</span>
          }
        </div>

        <div class="bubble-content">
          @if (msg.pending) {
            <div class="typing-indicator">
              <span></span><span></span><span></span>
            </div>
          } @else if (msg.role === 'assistant') {
            <div class="markdown-body" [innerHTML]="msg.content | markdown"></div>
          } @else {
            <p style="margin: 0; white-space: pre-wrap;">{{ msg.content }}</p>
          }
        </div>

      </div>
    }

    <div #messagesEnd></div>
  </div>

  <!-- Input -->
  <div class="chat-input glass-card" style="margin-top: 0.75rem; padding: 0.85rem 1.25rem; display: flex; gap: 0.75rem; align-items: flex-end; border-radius: var(--radius);">
    <textarea
      class="chat-textarea"
      rows="2"
      placeholder="Pergunte sobre preços, fornecedores, produtos... (Enter para enviar, Shift+Enter nova linha)"
      [value]="input()"
      (input)="input.set($any($event.target).value)"
      (keydown)="onKeyDown($event)"
      [disabled]="isSending()"
    ></textarea>

    <button
      class="btn-fx"
      style="flex-shrink: 0; height: 52px; padding: 0 1.25rem;"
      [disabled]="!input().trim() || isSending()"
      (click)="send()"
    >
      @if (isSending()) {
        <span class="spinner-fx" style="width: 16px; height: 16px; border-width: 2px;"></span>
      } @else {
        Enviar
      }
    </button>
  </div>

</div>
